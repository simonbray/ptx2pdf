# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        sudo apt install build-essential cmake libgirepository-2.0-dev libcairo2-dev pkg-config python3-dev gir1.2-gtk-3.0 texlive-xetex python3-setuptools gir1.2-poppler-0.18 gir1.2-gtksource-3.0 python3-numpy python3-gi gobject-introspection gir1.2-gtk-3.0 libgtk-3-0 libgtk-3-bin gir1.2-gtksource-3.0 python3-cairo python3-regex python3-pil xvfb
        python -m pip install pycairo PyGObject
        python -m pip install --upgrade pip
        python -m pip install -e .
        ptxprint --help
    - name: Run tests
      run: |
        cd test/recorded_tests
        for test in *zip; do xvfb-run --auto-servernum ptxprint -t $test; done
